<svg width="100%" viewBox="0 0 680 880" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Private Intranet Multi-Cloud Architecture — Phase 7 Complete</title>
<desc>White and blue summer-themed architecture diagram showing the full 7-phase private intranet system.</desc>
<defs>
  <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- background -->
<rect x="0" y="0" width="680" height="880" fill="#F4F8FF"/>

<!-- header band -->
<rect x="0" y="0" width="680" height="52" fill="#1A5FBF"/>
<text x="24" y="20" style="font-size:11px;font-weight:500;fill:#B8D4FF;font-family:sans-serif;letter-spacing:1.5px">PORTFOLIO · CLOUD ARCHITECTURE</text>
<text x="24" y="40" style="font-size:14px;font-weight:500;fill:#FFFFFF;font-family:sans-serif">R.Goto — Private Intranet · Multi-Cloud Serverless · AWS × Azure · 2026</text>

<!-- AWS region box -->
<rect x="16" y="66" width="506" height="594" rx="14" fill="#FFFFFF" stroke="#378ADD" stroke-width="1"/>
