<rect x="552" y="86" width="108" height="44" rx="8" fill="#FFFFFF" stroke="#378ADD" stroke-width="1.2"/>
<text x="606" y="108" text-anchor="middle" dominant-baseline="central" style="font-size:13px;font-weight:500;fill:#185FA5;font-family:sans-serif">User</text>

<!-- HTTPS -->
