<text x="328" y="532" text-anchor="middle" dominant-baseline="central" style="font-size:13px;font-weight:500;fill:#0C447C;font-family:sans-serif">Email notification</text>
<text x="328" y="548" text-anchor="middle" dominant-baseline="central" style="font-size:11px;fill:#185FA5;font-family:sans-serif">Gmail · on ERROR</text>

<!-- CloudTrail Phase 7 -->
<rect x="36" y="450" width="172" height="52" rx="8" fill="#1A5FBF" stroke="#0C447C" stroke-width="1"/>
